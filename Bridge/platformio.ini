[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.mcu = esp32
board_build.f_cpu = 240000000L

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; Build options
build_flags = 
    -D DEBUG_LEVEL=2
    -O2

; Required Libraries
lib_deps = 
    coryjfowler/MCP_CAN @ ^1.5.0

; Core Arduino-ESP32 includes WiFi & ESP_NOW built-in
